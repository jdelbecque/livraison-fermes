<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Livraison fermes</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Livraison fermes">
</head>

<body>

  <!-- ✅ LOGO + TITRE -->
  <div id="logo">
    <img src="logo.png" alt="Logo Livraison fermes">
    <span class="title">Livraison fermes</span>
  </div>

  <!-- Recherche -->
  <input
    id="recherche"
    placeholder="Rechercher une ferme ou une ville"
  >

  <!-- Compteur -->
  <div id="compteur"></div>

  <!-- Boutons -->
  <button onclick="nouvelleTournee()">Nouvelle tournée</button>
  <button onclick="creerTournee()">Créer la tournée</button>
  <button onclick="toutDeselectionner()">Tout désélectionner</button>

  <!-- Zone liste -->
  <div id="liste"></div>

  <!-- JavaScript -->
  <script src="app.js"></script>

</body>
</html>
